name: mental
description: A mental wellness app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 🔥 Firebase Core (মূল Firebase সিস্টেম)
  firebase_core: ^2.24.2
  
  # 🔐 Authentication (ইউজার লগইন/রেজিস্টার)
  firebase_auth: ^4.16.0
  
  # 🗄️ Cloud Firestore (ডাটাবেস)
  cloud_firestore: ^4.14.0
  
  # 📁 Cloud Storage (ইমেজ/ফাইল স্টোরেজ)
  firebase_storage: ^11.6.0
  
  # 🔔 Push Notifications
  firebase_messaging: ^14.7.0
  
  # 📍 State Management
  provider: ^6.1.1
  
  # 🧭 Navigation
  go_router: ^13.0.0
  
  # 🎨 UI
  google_fonts: ^6.1.0
  lottie: ^2.7.0
  flutter_svg: ^2.0.9
  
  # 📝 Forms
  flutter_form_builder: ^9.1.0
  
  # 💾 Local Storage
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/